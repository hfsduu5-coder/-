<script>
// ===================== LECTURE DATA =====================
const LECS = [
{
  id:'lec1', icon:'📚',
  title:'LEC 1: Introduction to Database Systems',
  titleAr:'المحاضرة 1: مقدمة في أنظمة قواعد البيانات',
  exp:`
<div class="cc">
  <div class="sec-title">📌 Data vs Information vs File Systems</div>
  <div class="kp"><div><strong>Data</strong> — Raw known facts with implicit meaning. Represented as alphabets (A-Z), digits (0-9), or special characters (+,−,#,$). <em>Example: 25, "Rami"</em></div></div>
  <div class="kp"><div><strong>Information</strong> — Processed data on which decisions and actions are based. Organized and classified to provide meaningful values. <em>Example: "The age of Rami is 20"</em></div></div>
  <div class="kp"><div><strong>File System</strong> — An early attempt to computerize manual filing. Each application program defines and manages its own data.</div></div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> البيانات هي الحقائق الخام، أما المعلومات فهي البيانات بعد معالجتها لاتخاذ القرارات. نظام الملفات التقليدي كان له عيوب كثيرة أدت إلى ظهور قواعد البيانات.</div>
  <h3>⚠️ Limitations of File Systems</h3>
  <div class="igrid">
    <div class="ibox"><h4>Separation & Isolation</h4><p>Data isolated between programs — hard to share</p></div>
    <div class="ibox"><h4>Data Dependence</h4><p>Programs depend on data format — changes break programs</p></div>
    <div class="ibox"><h4>Security Problems</h4><p>No unified access control mechanism</p></div>
    <div class="ibox"><h4>Redundancy & Inconsistency</h4><p>Same data stored in multiple places, may conflict</p></div>
    <div class="ibox"><h4>Format Limitation</h4><p>File format cannot be reused across applications</p></div>
  </div>
</div>
<div class="cc">
  <div class="sec-title">🗄️ Database & DBMS</div>
  <div class="kp"><div><strong>Database</strong> — Collection of logically related data stored without harmful redundancy, serving multiple applications. Independent from programs.</div></div>
  <div class="kp"><div><strong>Field</strong> — Smallest unit of data with meaning (e.g., Name, Address). Also called data item or data element.</div></div>
  <div class="kp"><div><strong>Record</strong> — Collection of logically related fields. Can be fixed-length or variable-length.</div></div>
  <div class="kp"><div><strong>File</strong> — Collection of related records (e.g., telephone directory).</div></div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> الحقل → السجل → الملف هي التسلسل الهرمي لتنظيم البيانات. قاعدة البيانات تحتوي على جميع هذه العناصر منظمةً معاً.</div>
  <h3>📦 Database Advantages</h3>
  <div class="igrid">
    <div class="ibox"><h4>1. Reduced Redundancy</h4><p>No harmful duplicate data</p></div>
    <div class="ibox"><h4>2. Data Independence</h4><p>Programs independent from data format</p></div>
    <div class="ibox"><h4>3. High Speed Retrieval</h4><p>Fast access to specific data</p></div>
    <div class="ibox"><h4>4. Flexibility</h4><p>Handles many data formats</p></div>
    <div class="ibox"><h4>5. Integrity</h4><p>Data accuracy maintained</p></div>
    <div class="ibox"><h4>6. Security</h4><p>Access restrictions applied</p></div>
  </div>
  <h3>🖥️ DBMS — Database Management System</h3>
  <p>A <strong>DBMS</strong> is a collection of interrelated data and programs to access those data. It facilitates: <strong>Defining</strong> (specifying types & structures), <strong>Constructing</strong> (storing data), <strong>Manipulating</strong> (querying, updating, reporting), and <strong>Sharing</strong> (multiple users simultaneously).</p>
  <p><strong>Meta-data</strong> = database definition stored in the database catalog/dictionary.</p>
  <div class="hbox"><strong>Popular DBMS Products</strong> Oracle, MySQL, Microsoft SQL Server, Microsoft Access, Sybase ASE, DB2, Ingres, PostgreSQL</div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> نظام إدارة قواعد البيانات (DBMS) هو البرنامج الذي يدير قاعدة البيانات. المعلومات الوصفية (Meta-data) تُخزّن في قاموس البيانات.</div>
</div>
<div class="cc">
  <div class="sec-title">⚙️ DBMS Advantages & Architecture</div>
  <div class="igrid">
    <div class="ibox"><h4>Data Independence</h4><p>Abstract view protects app code from storage details</p></div>
    <div class="ibox"><h4>Efficient Access</h4><p>Sophisticated techniques for fast storage/retrieval</p></div>
    <div class="ibox"><h4>Integrity & Security</h4><p>Constraints enforced; access controls applied</p></div>
    <div class="ibox"><h4>Crash Recovery</h4><p>Protects users from system failures</p></div>
    <div class="ibox"><h4>Concurrent Access</h4><p>Schedules multiple users accessing simultaneously</p></div>
  </div>
  <h3>🏛️ Three Types of DBMS Architecture</h3>
  <table class="dt"><tr><th>Architecture</th><th>Description</th><th>Use Case</th></tr>
  <tr><td><strong>1-Tier</strong></td><td>Client, server & DB on same machine. No network needed.</td><td>Local development, learning SQL</td></tr>
  <tr><td><strong>2-Tier</strong></td><td>DB on server; application on client. Connected via network. Uses JDBC/ODBC.</td><td>Small to medium apps</td></tr>
  <tr><td><strong>3-Tier</strong></td><td>Client → Application Server → Database Server. Intermediate layer exchanges partially processed data.</td><td>Enterprise web applications</td></tr></table>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> المعمارية ثلاثية الطبقات هي الأكثر استخداماً في تطبيقات الويب الحديثة. الطبقة الوسطى (Application Server) تعمل كوسيط بين المستخدم وقاعدة البيانات.</div>
</div>
<div class="cc">
  <div class="sec-title">📅 History & Applications</div>
  <table class="dt"><tr><th>Era</th><th>Milestone</th></tr>

<div class="cc">
  <div class="sec-title">💡 Why MySQL?</div>
  <div class="igrid">
    <div class="ibox"><h4>Multiple Storage Engines</h4><p>Unlike SQL Server, MySQL supports InnoDB (foreign keys, ACID) and MyISAM (simple, high performance)</p></div>
    <div class="ibox"><h4>High Performance</h4><p>Due to simplicity in design and multiple storage engines</p></div>
    <div class="ibox"><h4>Cost Effective</h4><p>Community edition is FREE. Lower licensing fees than MS SQL Server</p></div>
    <div class="ibox"><h4>Cross Platform</h4><p>Works on many OS platforms. MS SQL Server only runs on Windows</p></div>
  </div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> InnoDB هو محرك التخزين الافتراضي منذ الإصدار 5.5 ويدعم المفاتيح الخارجية ومعاملات ACID. أما MyISAM فكان الافتراضي قبل 5.5 ويتميز بالبساطة والأداء العالي لكنه لا يدعم المعاملات.</div>
</div>
<div class="cc">
  <div class="sec-title">🖥️ MySQL Workbench Features</div>
  <div class="igrid">
    <div class="ibox"><h4>SQL Development</h4><p>Create/manage connections; execute SQL queries via built-in SQL Editor</p></div>
    <div class="ibox"><h4>Data Modeling (Design)</h4><p>Create database schema graphically; reverse/forward engineer; comprehensive Table Editor</p></div>
    <div class="ibox"><h4>Server Administration</h4><p>Manage users, backup/recovery, audit data, monitor performance</p></div>
    <div class="ibox"><h4>Data Migration</h4><p>Migrate from MS SQL Server, Access, PostgreSQL, SQLite and others to MySQL</p></div>
  </div>
  <h3>🔧 Main Sections of MySQL Workbench Interface</h3>
  <div class="kp"><div><strong>SQL Editor</strong> — Where you create and edit queries</div></div>
  <div class="kp"><div><strong>Help Panel</strong> — View syntax and description for specific keywords</div></div>

</div>
<div class="cc">
  <div class="sec-title">📝 Creating a Database</div>
  <h3>Method 1: SQL Command</h3>
  <code class="cblk">CREATE DATABASE bakery;
-- OR equivalent:
CREATE SCHEMA bakery;</code>
  <h3>Method 2: GUI</h3>
  <p>Click the "Create Schema" icon at top of Workbench → Enter name → Click Apply → Click Apply again → Click Finish</p>
  <p>To view databases: Click <strong>Schemas</strong> in Navigator panel. If not visible, click Refresh.</p>

</div>
<div class="cc">

    <li>Go to Schema menu → Select database → Double-click it</li>

    <li>Click Apply → Apply (execute SQL) → Finish (save)</li>
  </ol>
  <h3>SQL Syntax:</h3>
  <code class="cblk">CREATE TABLE bakery.Menu (
  id INT,
  name VARCHAR(45),
  price INT,
  date_created DATE
);</code>
  <h3>Column Attributes in MySQL Workbench:</h3>
  <div class="igrid">
    <div class="ibox"><h4>PK</h4><p>Primary Key</p></div>
    <div class="ibox"><h4>NN</h4><p>Not Null</p></div>
    <div class="ibox"><h4>UI</h4><p>Unique Index</p></div>
    <div class="ibox"><h4>AI</h4><p>Auto Increment</p></div>
    <div class="ibox"><h4>UN</h4><p>Unsigned Data Type</p></div>
    <div class="ibox"><h4>BIN</h4><p>Binary</p></div>
  </div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> VARCHAR(45) يعني نص متغير الطول بحد أقصى 45 حرف. INT للأعداد الصحيحة. DATE لتخزين التواريخ. PK يضمن تفرد كل سجل.</div>

<div class="cc">

INSERT INTO menu

-- Insert specific columns:
INSERT INTO menu (id, name, price, date_created)
VALUES (1, 'croissant', 1, '2020-12-16');

-- Insert multiple rows:
INSERT INTO menu VALUES
(2, 'bread', 3, '2020-12-16'),
(3, 'eclairs', 2, '2020-12-16');</code>
  <h3>Retrieve Data — SQL Syntax:</h3>
  <code class="cblk">-- Get all data:
SELECT * FROM menu;

-- Sort by price (highest first):
SELECT * FROM menu
ORDER BY price DESC;</code>

  title:'LEC 2: Schemas, Data Models & Keys',
  titleAr:'المحاضرة 2: المخططات ونماذج البيانات والمفاتيح',
  exp:`
<div class="cc">
  <div class="sec-title">🏛️ Three-Schema Architecture</div>
  <p>Goal: Separate user applications from the physical database. Three levels:</p>
  <table class="dt"><tr><th>Level</th><th>Schema Type</th><th>Description</th></tr>
  <tr><td><strong>Internal Level</strong></td><td>Internal Schema</td><td>Describes physical storage structure; uses physical data model; complete details of storage and access paths</td></tr>
  <tr><td><strong>Conceptual Level</strong></td><td>Conceptual Schema</td><td>Describes structure of WHOLE database for community of users; hides physical details; describes entities, types, relationships, constraints</td></tr>
  <tr><td><strong>External Level</strong></td><td>External Schema (User Views)</td><td>Describes part of database that a particular user group is interested in; hides rest of database</td></tr></table>
  <div class="hbox"><strong>Mappings</strong> The process of transforming requests and results between schema levels is called MAPPING. DBMS transforms: external request → conceptual → internal → stored database.</div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> المعمارية ثلاثية المخططات تفصل تطبيقات المستخدمين عن قاعدة البيانات الفيزيائية. المستوى الداخلي = تخزين فيزيائي. المستوى المفاهيمي = البنية المنطقية للكل. المستوى الخارجي = ما يراه المستخدم. التحويل (Mapping) يربط هذه المستويات.</div>
</div>
<div class="cc">
  <div class="sec-title">📊 Six Categories of Data Models</div>
  <h3>1. Hierarchical Model (First DBMS model)</h3>
  <div class="kp"><div>Organizes data in upside-down tree structure. Links connect exactly two records (parent-child).</div></div>
  <div class="kp"><div><strong>Features:</strong> One-to-many relationships; parent can have multiple children; multiple parents NOT allowed; pointers link parent to child</div></div>
  <div class="kp"><div><strong>Deletion Problem:</strong> Deleting parent automatically deletes all children</div></div>
  <div class="kp"><div><strong>Advantages:</strong> Simple, fast traversal; automatic data integrity</div></div>
  <div class="kp"><div><strong>Disadvantages:</strong> Complex relationships not supported; deletion cascades</div></div>
  <h3>2. Network Model</h3>
  <div class="kp"><div>Same as hierarchical BUT a record CAN have more than one parent. Replaces tree with GRAPH.</div></div>
  <div class="kp"><div>Supports many-to-many relationships; multiple paths to same record; uses circular linked list</div></div>
  <h3>3. Relational Model (Most widely used)</h3>
  <div class="kp"><div>Uses collection of TABLES (relations) to represent data and relationships. Each table = multiple columns with unique names.</div></div>
  <div class="kp"><div>Record-based model with fixed-format records. Supports structural independence.</div></div>
  <div class="kp"><div><strong>Advantages:</strong> Simple, Scalable (add rows/columns easily), Structural independence</div></div>
  <div class="kp"><div><strong>Disadvantages:</strong> Hardware overhead, Bad design possibilities</div></div>
  <h3>4. Entity-Relationship (ER) Model</h3>
  <div class="kp"><div>High-level data model diagram. Represents real-world in pictorial form. Uses entities, attributes, and relationships. Widely used in database design.</div></div>
  <div class="kp"><div><strong>Advantages:</strong> Simple, effective communication tool, easy conversion to other models</div></div>
  <div class="kp"><div><strong>Disadvantages:</strong> No industry standard for notation; hidden information possible</div></div>
  <h3>5. Object-Based Data Model</h3>
  <div class="kp"><div>Both data AND relationships in single structure called OBJECT. Extends ER with encapsulation, methods, object identity. Can store audio/video/images.</div></div>
  <h3>6. Semi-Structured Data Model</h3>
  <div class="kp"><div>Different entities of same type MAY have different attributes. Cannot differentiate between data and schema. XML is widely used to represent it.</div></div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> النماذج الستة: هرمي (أول نموذج) → شبكي → علائقي (الأكثر استخداماً) → E-R (للتصميم) → كائني → شبه منظم (XML). النموذج العلائقي هو الأساس لمعظم قواعد البيانات الحديثة.</div>
</div>
<div class="cc">
  <div class="sec-title">🔑 Keys in Relational Databases</div>
  <div class="igrid">
    <div class="ibox"><h4>Super Key</h4><p>Set of one or more attributes that uniquely identify a tuple. May contain extra attributes. Example: {ID} or {ID, Name}</p></div>
    <div class="ibox"><h4>Candidate Key</h4><p>Minimal super key (no proper subset is also a super key). A relation may have multiple candidate keys.</p></div>
    <div class="ibox"><h4>Primary Key</h4><p>A chosen candidate key for identifying tuples. Values rarely/never change. Shown UNDERLINED in schema.</p></div>
    <div class="ibox"><h4>Foreign Key</h4><p>Attribute in relation r1 that references the primary key of another relation r2. Creates referential integrity.</p></div>
  </div>
  <h3>Relational Database Terminology:</h3>
  <table class="dt"><tr><th>Term</th><th>Meaning</th></tr>
  <tr><td>Relation</td><td>Table</td></tr>
  <tr><td>Tuple</td><td>Row/Record</td></tr>
  <tr><td>Attribute</td><td>Column</td></tr>
  <tr><td>Domain</td><td>Set of permitted values for an attribute</td></tr>
  <tr><td>Null</td><td>Unknown or non-existent value</td></tr>
  <tr><td>Atomic Domain</td><td>Domain where elements are indivisible units</td></tr>
  <tr><td>Relation Instance</td><td>Specific set of rows at a given time</td></tr>
  <tr><td>Schema</td><td>Logical design (doesn't change); e.g., instructor(ID, name, dept_name, salary)</td></tr></table>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> Super Key ⊇ Candidate Key → اختر منها Primary Key. Foreign Key يشير إلى Primary Key في جدول آخر. الـ Domain يحدد القيم المسموح بها للعمود. الـ Null يعني قيمة غير معروفة أو غير موجودة.</div>
</div>
<div class="cc">
  <div class="sec-title">⚖️ Relational vs Non-Relational</div>
  <table class="dt"><tr><th>Property</th><th>Relational</th><th>Non-Relational</th></tr>
  <tr><td>Schema</td><td>Fixed, predefined</td><td>Dynamic (flexible)</td></tr>
  <tr><td>Scaling</td><td>Vertical (scale-up)</td><td>Horizontal (scale-out)</td></tr>
  <tr><td>Properties</td><td>ACID</td><td>BASE</td></tr>
  <tr><td>Query Language</td><td>Standard SQL</td><td>Varies by system</td></tr>
  <tr><td>Consistency</td><td>Strong consistency</td><td>Eventual consistency</td></tr>
  <tr><td>Data Duplication</td><td>Eliminated by design</td><td>Allowed</td></tr>
  <tr><td>Throughput</td><td>Lower data throughput</td><td>Higher data throughput</td></tr></table>
</div>`,

  titleAr:'المحاضرة 3: نموذج الكيان والعلاقة',
  exp:`
<div class="cc">
  <div class="sec-title">🏢 Entities & Attributes</div>
  <p>The <strong>ER Model</strong> defines the conceptual view of a database. A database can be modeled as: entities, relationships among entities, and attributes of entities.</p>
  <div class="kp"><div><strong>Entity</strong> — A real-world thing (animate or inanimate) that is identifiable and distinguishable. Example: student, teacher, class, course.</div></div>
  <div class="kp"><div><strong>Entity Set</strong> — Collection of entities of the SAME type sharing same properties. Example: Students set = all students of a school.</div></div>
  <h3>🏷️ Types of Attributes</h3>
  <table class="dt"><tr><th>Type</th><th>Description</th><th>Example</th></tr>
  <tr><td><strong>Simple (Atomic)</strong></td><td>Cannot be divided further</td><td>Phone number (10 digits)</td></tr>
  <tr><td><strong>Composite</strong></td><td>Made of more than one simple attribute</td><td>Name = {First_name, Last_name}</td></tr>
  <tr><td><strong>Derived</strong></td><td>Value derived from other attributes; not physically stored</td><td>Age derived from Date_of_Birth</td></tr>
  <tr><td><strong>Single-valued</strong></td><td>Contains only one value</td><td>SSN (Social Security Number)</td></tr>
  <tr><td><strong>Multi-valued</strong></td><td>Can contain more than one value</td><td>Phone_numbers, Email_addresses</td></tr>
  <tr><td><strong>NULL valued</strong></td><td>Value not known to user</td><td>Middle name (if not applicable)</td></tr></table>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> أنواع الخصائص: بسيط (لا تقبل التقسيم) | مركب (مكون من خصائص أبسط) | مشتق (مستنبط من غيره) | أحادي القيمة | متعدد القيم | فارغ القيمة. كما يمكن دمجها مثل: simple single-valued أو composite multi-valued.</div>
</div>
<div class="cc">
  <div class="sec-title">🔗 Relationships & Keys in ER</div>
  <div class="kp"><div><strong>Relationship</strong> — Association among entities. Example: employee "works_at" department.</div></div>
  <div class="kp"><div><strong>Relationship Set</strong> — Relationships of similar type. Relationships can also have descriptive attributes.</div></div>
  <div class="kp"><div><strong>Degree of Relationship:</strong> Binary=2, Ternary=3, n-ary=n</div></div>
  <div class="kp"><div><strong>Recursive Relationship:</strong> Same entity type participates more than once in different roles. Example: employee married to employee.</div></div>
  <h3>🔑 Entity Keys</h3>
  <div class="igrid">
    <div class="ibox"><h4>Super Key</h4><p>Set of attributes (one or more) that collectively identifies an entity in entity set</p></div>
    <div class="ibox"><h4>Candidate Key</h4><p>Minimal super key. Entity set may have more than one candidate key.</p></div>
    <div class="ibox"><h4>Primary Key</h4><p>One candidate key chosen by designer to uniquely identify entity set</p></div>
  </div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> درجة العلاقة: ثنائية (2 كيانات) | ثلاثية (3 كيانات) | n-arity (n كيانات). العلاقة العودية تربط الكيان بنفسه. مفتاح الكيان يحدده بشكل فريد في مجموعة الكيانات.</div>
</div>
<div class="cc">
  <div class="sec-title">📊 Mapping Constraints (Cardinality)</div>
  <p>Cardinality defines how many entities in one set can be associated with entities in another set via relationship.</p>
  <table class="dt"><tr><th>Type</th><th>Description</th><th>ER Notation</th></tr>
  <tr><td><strong>One-to-One (1:1)</strong></td><td>One entity from A → at most one entity from B, and vice versa</td><td>1 — ◇ — 1</td></tr>
  <tr><td><strong>One-to-Many (1:N)</strong></td><td>One entity from A → more than one from B; one from B → at most one from A</td><td>1 — ◇ — N</td></tr>
  <tr><td><strong>Many-to-One (N:1)</strong></td><td>More than one from A → at most one from B; one from B → more than one from A</td><td>N — ◇ — 1</td></tr>
  <tr><td><strong>Many-to-Many (M:N)</strong></td><td>One from A → more than one from B AND vice versa</td><td>N — ◇ — N</td></tr></table>
  <h3>Participation Constraints</h3>
  <div class="igrid">
    <div class="ibox"><h4>Total Participation</h4><p>ALL entities from an entity set MUST participate in the relationship. Represented by DOUBLE LINES in ER diagram.</p></div>
    <div class="ibox"><h4>Partial Participation</h4><p>NOT all entities need to participate in the relationship. Represented by SINGLE LINE in ER diagram.</p></div>
  </div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> الإسهام الكلي (خط مزدوج) = كل الكيانات يجب أن تشارك. الإسهام الجزئي (خط واحد) = المشاركة اختيارية. الأعداد الكردينالية تحدد عدد الكيانات المترابطة.</div>
</div>
<div class="cc">
  <div class="sec-title">📐 ER Diagram Symbols</div>
  <table class="dt"><tr><th>Symbol</th><th>Represents</th></tr>
  <tr><td>Rectangle □</td><td>Entity sets</td></tr>
  <tr><td>Ellipse ○</td><td>Simple attributes</td></tr>
  <tr><td>Ellipses connected to ellipse ○—○</td><td>Composite attributes</td></tr>
  <tr><td>Double ellipse ⊚</td><td>Multivalued attributes</td></tr>
  <tr><td>Dashed ellipse ○---</td><td>Derived attributes</td></tr>
  <tr><td>Underline in attribute</td><td>Primary key attribute</td></tr>
  <tr><td>Diamond ◇</td><td>Relationship sets</td></tr>
  <tr><td>Double rectangle ⊡</td><td>Weak entity set</td></tr>
  <tr><td>Double diamond ◈</td><td>Identifying relationship (for weak entity)</td></tr>
  <tr><td>Dashed underline</td><td>Partial key (discriminator) of weak entity</td></tr>
  <tr><td>Double lines ═</td><td>Total participation</td></tr>
  <tr><td>Single line —</td><td>Partial participation</td></tr></table>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> حفظ الرموز مهم جداً: مستطيل=كيان | بيضاوي=خاصية | معين=علاقة | مزدوج=كيان ضعيف. الخط المزدوج=إسهام كلي | الخط المكسور=خاصية مشتقة | البيضاوي المزدوج=خاصية متعددة القيم.</div>
</div>
<div class="cc">
  <div class="sec-title">⚠️ Weak Entities & Enhanced ER</div>
  <div class="kp"><div><strong>Weak Entity</strong> — Does not have enough attributes to form a primary key. Its existence depends on another entity (identifying entity set). Uses discriminator attributes (partial key) + owner's primary key.</div></div>
  <div class="kp"><div><strong>Strong Entity</strong> = has its own primary key = DOMINANT entity set</div></div>
  <div class="kp"><div>Weak entity set = SUBORDINATE entity set. If strong entity deleted → weak entity must be deleted.</div></div>
  <div class="kp"><div>Weak entity must be part of ONE-TO-MANY relationship to be meaningful.</div></div>
  <h3>Enhanced ER (EER) Concepts:</h3>
  <div class="igrid">
    <div class="ibox"><h4>Generalization</h4><p>BOTTOM-UP: Two lower-level entities combine to form a higher-level entity. Starts with distinct entities sharing attributes.</p></div>
    <div class="ibox"><h4>Specialization</h4><p>TOP-DOWN: Higher-level entity divided into sub-entities. Depicted by triangle labeled ISA. Example: Employee ISA {Officer, Secretary, Teller}</p></div>
    <div class="ibox"><h4>Inheritance</h4><p>Lower-level entity inherits ALL attributes and relationship participations of higher-level entity.</p></div>
    <div class="ibox"><h4>Aggregation</h4><p>When relationship of two entities acts as ONE entity in another relationship. Example: (Employee Works-On Project) relationship is managed by Manager.</p></div>
  </div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> الكيان الضعيف لا مفتاح أساسي له ويعتمد على كيان قوي. التعميم (من الأسفل للأعلى) ≠ التخصيص (من الأعلى للأسفل). الوراثة تنقل جميع الخصائص من الأب للابن. التجميع يحول العلاقة إلى كيان.</div>
</div>`,

  exp:`
<div class="cc">
  <div class="sec-title">🗺️ ER-to-Relational Mapping Algorithm (7 Steps)</div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> خوارزمية التحويل من E-R إلى العلائقي تتكون من 7 خطوات. كل خطوة تتناول نوعاً مختلفاً من عناصر مخطط E-R وتحوله إلى جداول علائقية.</div>
  <table class="dt"><tr><th>Step</th><th>Handles</th><th>Action</th></tr>
  <tr><td><strong>Step 1</strong></td><td>Regular (Strong) Entity Types</td><td>Create relation R with all simple attributes. Choose primary key from entity's key attributes.</td></tr>
  <tr><td><strong>Step 2</strong></td><td>Weak Entity Types</td><td>Create relation R with simple attributes of W. Add foreign key = primary key of owner entity. PK = owner's PK + partial key of W.</td></tr>
  <tr><td><strong>Step 3</strong></td><td>Binary 1:1 Relationships</td><td>Choose one entity (prefer total participation) as S. Add primary key of T as foreign key in S. Add simple attributes of relationship to S.</td></tr>
  <tr><td><strong>Step 4</strong></td><td>Binary 1:N Relationships</td><td>Identify N-side relation S. Add primary key of 1-side (T) as foreign key in S. Add relationship's simple attributes to S.</td></tr>
  <tr><td><strong>Step 5</strong></td><td>Binary M:N Relationships</td><td>Create NEW relation S. Add primary keys of both entities as foreign keys in S. Their COMBINATION = primary key of S. Add relationship's simple attributes.</td></tr>
  <tr><td><strong>Step 6</strong></td><td>Multivalued Attributes</td><td>Create NEW relation R with: attribute A + primary key K (as FK) of owner entity. PK of R = combination of A and K.</td></tr>
  <tr><td><strong>Step 7</strong></td><td>N-ary (n>2) Relationships</td><td>Create NEW relation S. Add primary keys of ALL participating entities as FKs in S. PK of S = combination of all foreign keys. Add relationship's simple attributes.</td></tr></table>
  <div class="hbox"><strong>COMPANY DB Example Result:</strong> EMPLOYEE(Fname,Minit,Lname,<u>Ssn</u>,Bdate,Address,Sex,Salary,Super_ssn,Dno) | DEPARTMENT(Dname,<u>Dnumber</u>,Mgr_ssn,Mgr_start_date) | DEPT_LOCATIONS(<u>Dnumber</u>,<u>Dlocation</u>) | PROJECT(Pname,<u>Pnumber</u>,Plocation,Dnum) | WORKS_ON(<u>Essn</u>,<u>Pno</u>,Hours) | DEPENDENT(<u>Essn</u>,<u>Dependent_name</u>,Sex,Bdate,Relationship)</div>
</div>
<div class="cc">
  <div class="sec-title">⚠️ Informal Design Guidelines & Anomalies</div>
  <h3>4 Informal Design Guidelines:</h3>
  <div class="kp"><div><strong>Guideline 1:</strong> Each relation schema should be easy to explain — corresponds to ONE entity type OR ONE relationship type. No mixing.</div></div>
  <div class="kp"><div><strong>Guideline 2:</strong> No insertion, deletion, or modification anomalies in base relations.</div></div>
  <div class="kp"><div><strong>Guideline 3:</strong> Avoid placing attributes with frequently NULL values in base relations.</div></div>
  <div class="kp"><div><strong>Guideline 4:</strong> Design schemas that join on appropriate (primary key, foreign key) pairs — avoid spurious tuples.</div></div>
  <h3>4 Types of Anomalies:</h3>
  <div class="igrid">
    <div class="ibox"><h4>Data Redundancy</h4><p>Same data repeated in multiple rows/columns → wastes memory</p></div>
    <div class="ibox"><h4>Insert Anomaly</h4><p>Cannot insert data without existence of other attributes. Example: Cannot add department with no employees yet (SSN cannot be null as PK)</p></div>
    <div class="ibox"><h4>Update Anomaly</h4><p>Duplicate data updated in only ONE place → database becomes inconsistent. Example: Manager change must update ALL employee tuples in that department.</p></div>
    <div class="ibox"><h4>Delete Anomaly</h4><p>Deleting one record causes inadvertent loss of other information. Example: Deleting last employee in a department loses department info.</p></div>
  </div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> التشوهات الأربعة هي السبب الرئيسي في استخدام التطبيع (Normalization). التكرار يؤدي إلى مشاكل الإدراج والتحديث والحذف. لمنع هذه المشاكل نستخدم الأشكال الطبيعية.</div>
</div>
<div class="cc">
  <div class="sec-title">🔁 Functional Dependencies (FDs)</div>
  <div class="kp"><div><strong>Functional Dependency X→Y:</strong> Set of attributes X functionally determines Y. If two tuples have same X value, they MUST have same Y value.</div></div>
  <div class="kp"><div>FDs are derived from real-world constraints on the attributes.</div></div>
  <div class="kp"><div>Written graphically as an arrow: X → Y</div></div>
  <h3>COMPANY Database FD Examples:</h3>

PNUMBER → {PNAME, PLOCATION}  (Project number determines name & location)
{SSN, PNUMBER} → HOURS   (Both together determine hours worked)</code>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> الاعتماد الوظيفي X→Y يعني: إذا عرفنا قيمة X نستطيع تحديد قيمة Y بشكل فريد. مثال: رقم الطالب → اسم الطالب. يُستخدم في تحديد المفاتيح وعملية التطبيع.</div>
</div>
<div class="cc">
  <div class="sec-title">📋 Normalization — Normal Forms</div>
  <p><strong>Normalization</strong> = organizing data to minimize redundancy and remove modification anomalies. Goal: eliminate redundancy, organize data efficiently, reduce anomalies.</p>
  <h3>1️⃣ First Normal Form (1NF)</h3>
  <div class="kp"><div>No repeating elements or groups of elements</div></div>
  <div class="kp"><div>All attribute values must be ATOMIC (simple, indivisible)</div></div>
  <div class="kp"><div>Eliminates: multi-valued attributes, composite attributes, nested relations</div></div>
  <div class="kp"><div>Each row must be unique (primary key)</div></div>
  <div class="hbox"><strong>How to fix:</strong> Remove violating attribute → place it in a SEPARATE relation along with the PK of original table. New PK = combination of both.</div>
  <h3>2️⃣ Second Normal Form (2NF)</h3>
  <div class="kp"><div>Must satisfy 1NF first</div></div>
  <div class="kp"><div>If PK is SINGLE attribute → automatically in 2NF</div></div>
  <div class="kp"><div>If PK is COMPOSITE → each non-key attribute must be FULLY dependent on the ENTIRE primary key (no partial dependency)</div></div>
  <div class="hbox"><strong>How to fix:</strong> Move partially dependent attributes to a new table with the part of PK they depend on.</div>
  <h3>3️⃣ Third Normal Form (3NF)</h3>
  <div class="kp"><div>Must satisfy 2NF first</div></div>
  <div class="kp"><div>No TRANSITIVE dependency for non-prime attributes</div></div>
  <div class="kp"><div><strong>Transitive FD:</strong> X→Z derived from X→Y and Y→Z (Y is a non-key attribute)</div></div>
  <div class="kp"><div>Any non-key field dependent on ANOTHER non-key field must be moved to a separate table</div></div>
  <div class="hbox"><strong>Example:</strong> In table with (Person ID, Name, City Name, City Number): City Number depends on City Name (not on PK Person ID) → Transitive dependency → Move to separate table!</div>
  <div class="ar-note"><span class="nlbl">ملاحظة</span> قاعدة التطبيع: 1NF=قيم ذرية فقط | 2NF=اعتماد كامل على المفتاح الكامل | 3NF=لا اعتماد عبر وسيط. كل شكل طبيعي يتضمن الذي قبله: 1NF ⊂ 2NF ⊂ 3NF.</div>
</div>`,

}

function buildQuiz(L,i,level){

    <span style="font-size:.78rem;color:var(--g500)">${qs.length} Questions</span>
  </div>
  <div class="score-card" id="score${i}${level}">Score: 0 / ${qs.length}</div>
</div>
<div class="prog-wrap">

    <button class="opt" id="opt${i}${level}${qi}${oi}" onclick="answer(${i},'${level}',${qi},${oi})">
      <span class="olbl">${labels[oi]}</span>${opt}
    </button>`).join('')}
  </div>
  <div class="fb" id="fb${i}${level}${qi}"></div>
</div>`).join('')}
<div class="quiz-ctrl">
  <button class="btn btn-burg" onclick="resetQuiz(${i},'${level}')">🔄 Restart Quiz</button>
  <button class="btn btn-sky" onclick="showAll(${i},'${level}')">📊 Show Results</button>
</div>
<div class="result-panel" id="res${i}${level}">
  <div class="res-score" id="resScore${i}${level}">0</div>
  <div class="res-total">out of ${qs.length}</div>
  <div class="res-bar-w"><div class="res-bar" id="resBar${i}${level}" style="width:0%"></div></div>
  <div class="res-msg" id="resMsg${i}${level}"></div>
  <button class="btn btn-burg" onclick="resetQuiz(${i},'${level}')">🔄 Try Again</button>
</div>`;
}

// ===================== QUIZ LOGIC =====================
function getState(i,level){
  const k=`${i}-${level}`;
  if(!quizState[k]) quizState[k]={answered:0,correct:0,done:{}};
  return quizState[k];
}

function answer(i,level,qi,chosen){
  const st=getState(i,level);
  if(st.done[qi]) return;
  const qs=level==='easy'?LECS[i].q.easy:level==='med'?LECS[i].q.medium:LECS[i].q.hard;
  const correct=qs[qi].a;
  st.done[qi]=true;
  st.answered++;
  const total=qs.length;
  // Disable all options
  for(let o=0;o<5;o++){
    const btn=document.getElementById(`opt${i}${level}${qi}${o}`);
    if(!btn) continue;
    btn.disabled=true;
  }
  // Mark correct
  const cBtn=document.getElementById(`opt${i}${level}${qi}${correct}`);
  if(cBtn) cBtn.classList.add('ok');
  const fb=document.getElementById(`fb${i}${level}${qi}`);
  if(chosen===correct){
    st.correct++;
    if(fb){fb.className='fb ok';fb.innerHTML='✅ إجابتك صحيحة!';}
  } else {
    const wBtn=document.getElementById(`opt${i}${level}${qi}${chosen}`);
    if(wBtn) wBtn.classList.add('no');
    if(fb){fb.className='fb no';fb.innerHTML=`❌ إجابتك خاطئة — الإجابة الصحيحة: <strong>${['A','B','C','D','E'][correct]}</strong>`;}
  }
  // Update score & progress
  document.getElementById(`score${i}${level}`).textContent=`Score: ${st.correct} / ${total}`;
  const pct=Math.round((st.answered/total)*100);
  document.getElementById(`progFill${i}${level}`).style.width=pct+'%';
  document.getElementById(`progTxt${i}${level}`).textContent=`${st.answered} of ${total} answered`;
  document.getElementById(`pct${i}${level}`).textContent=pct+'%';
}

function resetQuiz(i,level){
  const k=`${i}-${level}`;
  quizState[k]={answered:0,correct:0,done:{}};
  const qs=level==='easy'?LECS[i].q.easy:level==='med'?LECS[i].q.medium:LECS[i].q.hard;
  const total=qs.length;
  for(let qi=0;qi<total;qi++){
    const fb=document.getElementById(`fb${i}${level}${qi}`);
    if(fb){fb.className='fb';fb.innerHTML='';}
    for(let o=0;o<5;o++){
      const btn=document.getElementById(`opt${i}${level}${qi}${o}`);
      if(btn){btn.className='opt';btn.disabled=false;}
    }
  }
  document.getElementById(`score${i}${level}`).textContent=`Score: 0 / ${total}`;
  document.getElementById(`progFill${i}${level}`).style.width='0%';
  document.getElementById(`progTxt${i}${level}`).textContent=`0 of ${total} answered`;
  document.getElementById(`pct${i}${level}`).textContent='0%';
  const res=document.getElementById(`res${i}${level}`);
  if(res) res.classList.remove('show');
}

function showAll(i,level){
  const st=getState(i,level);
  const qs=level==='easy'?LECS[i].q.easy:level==='med'?LECS[i].q.medium:LECS[i].q.hard;
  const total=qs.length;
  // Answer all unanswered (show correct answers)
  for(let qi=0;qi<total;qi++){
    if(st.done[qi]) continue;
    const correct=qs[qi].a;
    st.done[qi]=true;
    st.answered++;
    for(let o=0;o<5;o++){const btn=document.getElementById(`opt${i}${level}${qi}${o}`);if(btn)btn.disabled=true;}
    const cBtn=document.getElementById(`opt${i}${level}${qi}${correct}`);
    if(cBtn) cBtn.classList.add('ok');
    const fb=document.getElementById(`fb${i}${level}${qi}`);
    if(fb){fb.className='fb no';fb.innerHTML=`📌 الإجابة الصحيحة: <strong>${['A','B','C','D','E'][correct]}</strong>`;}
  }
  document.getElementById(`progFill${i}${level}`).style.width='100%';
  document.getElementById(`progTxt${i}${level}`).textContent=`${total} of ${total} answered`;
  document.getElementById(`pct${i}${level}`).textContent='100%';
  const pct=Math.round((st.correct/total)*100);
  const res=document.getElementById(`res${i}${level}`);
  const bar=document.getElementById(`resBar${i}${level}`);
  if(res){
    res.classList.add('show');
    document.getElementById(`resScore${i}${level}`).textContent=st.correct;
    document.getElementById(`score${i}${level}`).textContent=`Score: ${st.correct} / ${total}`;
    if(bar){bar.style.width=pct+'%';bar.style.background=pct>=80?'#16a34a':pct>=60?'#d97706':'#dc2626';}
    const msgs=['حاول مرة أخرى! لا تستسلم 💪','جيد! تحتاج إلى مزيد من المراجعة 📚','جيد جداً! استمر 🎯','ممتاز! أداء رائع 🌟','مثالي! إجابة صحيحة على الجميع 🏆'];
    const idx=pct<40?0:pct<60?1:pct<80?2:pct<100?3:4;
    document.getElementById(`resMsg${i}${level}`).textContent=msgs[idx];
    res.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

// ===================== NAVIGATION =====================
function showLec(i,btn){
  document.querySelectorAll('.lec-sec').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec'+i).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  btn.classList.add('active');
  currentLec=i;
  closeSidebar();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showTab(i,tab,btn){
  const panes=document.querySelectorAll(`#sec${i} .tab-pane`);
  panes.forEach(p=>p.classList.remove('active'));
  document.getElementById(`tab${i}-${tab}`).classList.add('active');
  const btns=document.querySelectorAll(`#sec${i} .tab-btn`);
  btns.forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ===================== SIDEBAR TOGGLE =====================
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ===================== LANGUAGE TOGGLE =====================
function toggleLang(){
  arMode=!arMode;
  const btn=document.getElementById('translateBtn');
  if(arMode){
    document.body.classList.add('ar-mode');
    btn.textContent='🌐 English';
    btn.style.direction='rtl';
  } else {
    document.body.classList.remove('ar-mode');
    btn.textContent='🌐 عربي';
    btn.style.direction='ltr';
  }
}
